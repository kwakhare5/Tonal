<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tonal Lab v4 — High Fidelity Mirror</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
    body { background: #0a0a0a; color: #888; font-family: 'DM Sans', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
    
    /* Sidebar */
    .sidebar { width: 260px; background: #000; border-right: 1px solid #1a1a1a; padding: 48px 32px; box-sizing: border-box; }
    .title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3em; color: #444; margin-bottom: 48px; }
    .nav-item { font-size: 13px; font-weight: 500; padding: 12px 0; cursor: pointer; transition: 0.2s; display: block; border: none; background: none; color: #555; text-align: left; width: 100%; outline: none; }
    .nav-item:hover { color: #aaa; }
    .nav-item--active { color: white; }
    
    /* Main Area */
    .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px; position: relative; }
    .platform-header { position: absolute; top: 48px; left: 64px; display: flex; align-items: center; gap: 12px; }
    .platform-name { font-size: 24px; font-weight: 700; color: white; letter-spacing: -0.02em; }
    .platform-tag { font-size: 10px; font-weight: 700; background: #222; color: #888; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }

    /* The Mockup Container */
    .mockup { 
      width: 100%; max-width: 600px; background: white; border-radius: 12px; 
      box-shadow: 0 40px 100px rgba(0,0,0,0.5); overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* Common Input Styles */
    .editable { 
      width: 100%; min-height: 120px; padding: 20px; font-size: 15px; line-height: 1.5; 
      color: #1a1a1a; outline: none; box-sizing: border-box; 
    }

    /* Platform-Specific Mockups */
    .gmail-header { padding: 12px 16px; background: #f2f6fc; border-bottom: 1px solid #e0e0e0; font-size: 13px; font-weight: 500; color: #444; }
    .gmail-footer { padding: 12px 16px; border-top: 1px solid #f0f0f0; display: flex; gap: 8px; }
    .btn-send { background: #0b57d0; color: white; border: none; border-radius: 100px; padding: 8px 24px; font-size: 14px; font-weight: 500; }

    .slack-editor { border: 1px solid #ccc; border-radius: 8px; margin: 20px; }
    .slack-toolbar { background: #f8f8f8; padding: 8px; border-top: 1px solid #eee; display: flex; gap: 12px; }
    .slack-icon { width: 20px; height: 20px; background: #ddd; border-radius: 4px; }

    .linkedin-modal { border: 1px solid #e0e0e0; border-radius: 8px; margin: 20px; }
    .linkedin-footer { padding: 12px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; }
    .btn-li { background: #0a66c2; color: white; border: none; border-radius: 100px; padding: 6px 16px; font-weight: 600; font-size: 14px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="title">Tonal Lab v4</div>
    <button class="nav-item nav-item--active" onclick="switchPlatform('LinkedIn')">LinkedIn Messaging</button>
    <button class="nav-item" onclick="switchPlatform('Gmail')">Gmail Compose</button>
    <button class="nav-item" onclick="switchPlatform('Slack')">Slack Lexical</button>
    <button class="nav-item" onclick="switchPlatform('WhatsApp')">WhatsApp Web</button>
  </div>

  <div class="main">
    <div class="platform-header">
      <div id="p-name" class="platform-name">LinkedIn</div>
      <div class="platform-tag">Live Testing</div>
    </div>

    <div id="mockup-root" class="mockup">
      <!-- LinkedIn (Default) -->
      <div class="linkedin-modal">
        <div class="editable msg-form__contenteditable" contenteditable="true">
          I wanted to reach out about the new Elite architecture...
        </div>
        <div class="linkedin-footer">
          <button class="btn-li">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../src/core/tonal.js"></script>
  <script src="../src/extension/content.js"></script>
  <script>
    const platforms = {
      LinkedIn: `
        <div class="linkedin-modal">
          <div class="editable msg-form__contenteditable" contenteditable="true">I wanted to reach out about the new Elite architecture...</div>
          <div class="linkedin-footer"><button class="btn-li">Send</button></div>
        </div>`,
      Gmail: `
        <div class="gmail-header">New Message</div>
        <div class="editable Am Al editable" contenteditable="true" role="textbox">Hi there, here is the updated Tonal report...</div>
        <div class="gmail-footer"><button class="btn-send">Send</button></div>`,
      Slack: `
        <div class="slack-editor">
          <div class="editable ql-editor" contenteditable="true" data-lexical-editor="true">Let's coordinate on the design system v4...</div>
          <div class="slack-toolbar">
            <div class="slack-icon"></div><div class="slack-icon"></div><div class="slack-icon"></div>
          </div>
        </div>`,
      WhatsApp: `
        <div style="background:#efeae2; padding: 20px;">
          <div style="background:white; border-radius:8px; padding:10px; display:flex; align-items:center;">
            <div class="editable" contenteditable="true" data-tab="10" style="min-height:24px; flex:1;">Hey, check out the new pill docking!</div>
          </div>
        </div>`
    };

    function switchPlatform(name) {
      document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('nav-item--active', i.textContent.includes(name)));
      document.getElementById('p-name').textContent = name;
      document.getElementById('mockup-root').innerHTML = platforms[name];
      
      // The injector will pick up the new elements automatically due to the scan loop
    }
  </script>
</body>
</html>
